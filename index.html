<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scoring Match</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@400;500;600&display=swap" rel="stylesheet">

<style>
    /* =========================
   RESET + VARIABLES
========================= */
*, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

:root {
    --bg: linear-gradient(135deg, #6f7793, #ffffff);
    --bg2: #16181f;
    --bg3: #1e2028;
    --border: rgba(255,255,255,.08);
    --text: #e8e9ee;
    --text2: #8b8f9e;

    --teal: #1D9E75;
    --blue: #378ADD;
    --red: #E24B4A;

    --radius: 10px;
    --radius-lg: 16px;

    --font: 'Sora', sans-serif;
    --mono: 'DM Mono', monospace;
    
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
}

/* =========================
   TOPBAR
========================= */
.topbar {
    position: sticky;
    top: 0;
    display: flex;
    justify-content: space-between;
    padding: 12px 20px;
    background: rgba(14,15,19,.95);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
}

.live {
    display: flex;
    gap: 8px;
    align-items: center;
    color: var(--red);
    font-family: var(--mono);
    font-size: 12px;
}

.dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--red);
    animation: blink 1.3s infinite;
}

@keyframes blink {
    50% { opacity: .3; }
}
.btn-start {
    background: rgba(29,158,117,.1);
    border: 1px solid rgba(29,158,117,.3);
    color: var(--teal);
}

.btn-start:disabled {
    opacity: .4;
}
.btn-end {
    background: rgba(226,75,74,.1);
    border: 1px solid rgba(226,75,74,.3);
    color: #f09595;
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
}

/* =========================
   SCOREBOARD
========================= */
.page {
    max-width: 800px;
    margin: auto;
    padding: 20px;
}

.scoreboard {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
}

.team {
    display: flex;
    flex-direction: column;
    gap: 5px;
}

.bar {
    width: 30px;
    height: 3px;
    border-radius: 3px;
}

.score {
    font-size: 48px;
    font-family: var(--mono);
    text-align: center;
}

/* =========================
   TRIALS
========================= */
.section-title {
    margin: 20px 0 10px;
    font-size: 12px;
    font-family: var(--mono);
    color:#000000;
    text-transform: uppercase;
}

.card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    margin-bottom: 10px;
    overflow: hidden;
}

.card-header {
    padding: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--bg3);
}

.inputs {
    padding: 14px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.row {
    display: flex;
    align-items: center;
    gap: 8px;
}

.btn {
    width: 35px;
    height: 35px;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    cursor: pointer;
    border-radius: 8px;
}

.value {
    font-size: 22px;
    font-family: var(--mono);
    width: 40px;
    text-align: center;
}

textarea {
    width: 100%;
    margin: 10px 14px;
    padding: 10px;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
}

.save {
    margin: 0 14px 14px;
    padding: 10px;
    width: calc(100% - 28px);
    background: rgba(29,158,117,.15);
    border: 1px solid rgba(29,158,117,.3);
    color: var(--teal);
    border-radius: 8px;
    cursor: pointer;
}

/* =========================
   LOG
========================= */
.log {
    border: #000000 1px solid;
    background-color: #ffffff;
    margin-top: 20px;
}

.log-item {
    padding: 10px 0;
    border-bottom: 1px solid black;
    font-size: 13px;
    color: var(--text2);
}

/* =========================
   TOAST
========================= */
.toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg3);
    padding: 10px 20px;
    border-radius: 10px;
    opacity: 0;
    transition: .3s;
}

.toast.show {
    opacity: 1;
}
    
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
    <div class="live"><span class="dot"></span> LIVE MATCH</div>
    <button class="btn-start">start</button>
    <button class="btn-end">Terminer</button>
</div>

<div class="page">

    <!-- SCOREBOARD -->
    <div class="scoreboard">
        <div class="team">
            <div class="bar" style="background:#1D9E75"></div>
            <strong>Team A</strong>
        </div>

        <div class="score">
            <span id="aScore">0</span> — <span id="bScore">0</span>
        </div>

        <div class="team" style="text-align:right">
            <div class="bar" style="background:#378ADD;margin-left:auto"></div>
            <strong>Team B</strong>
        </div>
    </div>

    <!-- TRIAL -->
    <div class="section-title">Épreuves</div>

    <div class="card">

        <!-- ÉPREUVE 1 -->
        <div class="cards" data-id="1">
            <div class="card-header">
                <div>Tirée l'épée</div>
                <div class="badge">En cours</div>
            </div>

            <div class="inputs">
                <div class="row">
                    <button class="btn" onclick="change(this,'a',-1)">-</button>
                    <div class="value" data-team="a">0</div>
                    <button class="btn" onclick="change(this,'a',1)">+</button>
                </div>

                <div class="row">
                    <button class="btn" onclick="change(this,'b',-1)">-</button>
                    <div class="value" data-team="b">0</div>
                    <button class="btn" onclick="change(this,'b',1)">+</button>
                </div>
            </div>

            <button class="save" onclick="save(this)">Valider</button>
        </div>

        <!-- ÉPREUVE 2 -->
        <div class="cards" data-id="2">
            <div class="card-header">
                <div>Question Éclair</div>
                <div class="badge">En cours</div>
            </div>

            <div class="inputs">
                <div class="row">
                    <button class="btn" onclick="change(this,'a',-1)">-</button>
                    <div class="value" data-team="a">0</div>
                    <button class="btn" onclick="change(this,'a',1)">+</button>
                </div>

                <div class="row">
                    <button class="btn" onclick="change(this,'b',-1)">-</button>
                    <div class="value" data-team="b">0</div>
                    <button class="btn" onclick="change(this,'b',1)">+</button>
                </div>
            </div>

            <button class="save" onclick="save(this)">Valider</button>
        </div>

        <!-- ÉPREUVE 3 -->
        <div class="cards" data-id="3">
            <div class="card-header">
                <div>Identification</div>
                <div class="badge">En cours</div>
            </div>

            <div class="inputs">
                <div class="row">
                    <button class="btn" onclick="change(this,'a',-1)">-</button>
                    <div class="value" data-team="a">0</div>
                    <button class="btn" onclick="change(this,'a',1)">+</button>
                </div>

                <div class="row">
                    <button class="btn" onclick="change(this,'b',-1)">-</button>
                    <div class="value" data-team="b">0</div>
                    <button class="btn" onclick="change(this,'b',1)">+</button>
                </div>
            </div>

            <button class="save" onclick="save(this)">Valider</button>
        </div>

        <!-- ÉPREUVE 4 -->
        <div class="cards" data-id="4">
            <div class="card-header">
                <div>Question relais</div>
                <div class="badge">En cours</div>
            </div>

            <div class="inputs">
                <div class="row">
                    <button class="btn" onclick="change(this,'a',-1)">-</button>
                    <div class="value" data-team="a">0</div>
                    <button class="btn" onclick="change(this,'a',1)">+</button>
                </div>

                <div class="row">
                    <button class="btn" onclick="change(this,'b',-1)">-</button>
                    <div class="value" data-team="b">0</div>
                    <button class="btn" onclick="change(this,'b',1)">+</button>
                </div>
            </div>

            <button class="save" onclick="save(this)">Valider</button>
        </div>

    </div>

    <!-- LOG -->
    <div class="log">
        <div class="section-title">Journal</div>
    </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast">Score enregistré</div>

<script>

// =========================
// VARIABLES GLOBALES
// =========================
let scores = {};
let matchStarted = false;

const btnStart = document.querySelector('.btn-start');
const btnEnd = document.querySelector('.btn-end');


// =========================
// INIT
// =========================
initState();

function initState() {
    disableControls(true);
    btnEnd.disabled = true;
}


// =========================
// MATCH CONTROL
// =========================

// START MATCH
btnStart.addEventListener('click', () => {

    if (matchStarted) return;

    matchStarted = true;

    // reset scores
    scores = {};
    document.querySelectorAll('.value').forEach(el => el.innerText = 0);
    document.getElementById('aScore').innerText = 0;
    document.getElementById('bScore').innerText = 0;

    disableControls(false);

    document.querySelector('.live').innerHTML = '<span class="dot"></span> LIVE MATCH';

    btnStart.disabled = true;
    btnEnd.disabled = false;

    addSystemLog("Match démarré");
});


// END MATCH
btnEnd.addEventListener('click', () => {

    if (!matchStarted) return;
    if (!confirm("Terminer le match ?")) return;

    matchStarted = false;

    let totalA = 0;
    let totalB = 0;

    for (let key in scores) {
        totalA += scores[key].a || 0;
        totalB += scores[key].b || 0;
    }

    disableControls(true);

    document.querySelector('.live').innerText = "✔ MATCH TERMINÉ";

    let result = "";
    if (totalA > totalB) result = "🏆 Team A gagne";
    else if (totalB > totalA) result = "🏆 Team B gagne";
    else result = "🤝 Match nul";

    alert(result + `\nScore: ${totalA} - ${totalB}`);

    addSystemLog(`Match terminé → ${totalA} - ${totalB}`);

    btnStart.disabled = false;
});


// =========================
// SCORE MANAGEMENT
// =========================

// CHANGE SCORE
function change(btn, team, val) {

    if (!matchStarted) return;

    const card = btn.closest('.cards');
    const id = card.dataset.id;

    if (!scores[id]) {
        scores[id] = {a:0, b:0};
    }

    scores[id][team] = Math.max(0, (scores[id][team] || 0) + val);

    const el = card.querySelector(`[data-team="${team}"]`);
    el.innerText = scores[id][team];
}


// SAVE SCORE
function save(btn) {

    if (!matchStarted) return;

    const card = btn.closest('.cards');
    const id = card.dataset.id;

    const a = scores[id]?.a || 0;
    const b = scores[id]?.b || 0;

    updateTotal();
    addLog(id, a, b);
    showToast();
}


// =========================
// CALCULS
// =========================

// TOTAL GLOBAL
function updateTotal() {
    let totalA = 0;
    let totalB = 0;

    for (let key in scores) {
        totalA += scores[key].a || 0;
        totalB += scores[key].b || 0;
    }

    document.getElementById('aScore').innerText = totalA;
    document.getElementById('bScore').innerText = totalB;
}


// =========================
// UI HELPERS
// =========================

// BLOQUER / ACTIVER
function disableControls(state) {
    document.querySelectorAll('.btn, .save').forEach(el => {
        el.disabled = state;
    });
}


// LOG SCORE
function addLog(id, a, b) {
    const log = document.querySelector('.log');

    const item = document.createElement('div');
    item.className = 'log-item';
    item.innerText = `Épreuve ${id} → A: ${a} | B: ${b}`;

    log.appendChild(item);
}


// LOG SYSTEM
function addSystemLog(msg) {
    const log = document.querySelector('.log');

    const item = document.createElement('div');
    item.className = 'log-item';
    item.innerText = msg;

    log.appendChild(item);
}


// TOAST
function showToast(){
    const toast = document.getElementById('toast');
    toast.classList.add('show');

    setTimeout(()=>{
        toast.classList.remove('show');
    },2000);
}

</script>

</body>
</html>
