<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Équipes</title>
    <link rel="stylesheet" href="team.css">
</head>
<body>

    <section class="card">

                <img src="/img/team1.png" alt="Barouck">

            </div>

            <div class="team">
                <img src="/img/team2.jpeg" alt="Avengers">

            </div>

            <div class="team">
                <img src="/img/team3.png" alt="Missionnaires de Dieu">
                <span>Missionnaires de Dieu</span>
            </div>

            <div class="team">
                <img src="/img/team4.jpeg   " alt="Victorious">

            </div>

            <div class="team">
                <img src="/img/team5.png" alt="Flamme de Vie">
                <span>Flamme de Vie</span>
            </div>

            <div class="team">
                <img src="/img/team6.jpeg" alt="Sky Warriors">
                <span>Sky Warriors </span>
            </div>

            <div class="team">
                <img src="/img/team7.png" alt="Barouck">
                <span>Barouck</span>
            </div>

            <div class="team">
                <img src="/img/team8.jpeg" alt="God Avengers">
