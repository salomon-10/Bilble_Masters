<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Créer un match</title>
    <link rel="stylesheet" href="Choix.css">
</head>
<body>

<main class="container">

    <header class="header">
        <h1>choix des Équipes</h1>
        <p>Sélectionne 2 équipes pour lancer la compétition</p>
    </header>

    <section class="layout">

        <!-- LEFT -->
        <div class="card">

            <h2>Choisir les équipes</h2>

            <div id="message" class="message"></div>

            <div class="teams">

                <div class="team" data-name="Équipe 1">
                    <img src="https://via.placeholder.com/80" />
                    <span>Équipe 1</span>
                </div>

                <div class="team" data-name="Équipe 2">
                    <img src="https://via.placeholder.com/80" />
                    <span>Équipe 2</span>
                </div>

                <div class="team" data-name="Équipe 3">
                    <img src="https://via.placeholder.com/80" />
                    <span>Équipe 3</span>
                </div>

                <div class="team" data-name="Équipe 4">
                    <img src="https://via.placeholder.com/80" />
                    <span>Équipe 4</span>
                </div>

                <div class="team" data-name="Équipe 5">
                    <img src="https://via.placeholder.com/80" />
                    <span>Équipe 5</span>
                </div>

                <div class="team" data-name="Équipe 6">
                    <img src="https://via.placeholder.com/80" />
                    <span>Équipe 6</span>
                </div>
                 <div class="team" data-name="Équipe 7">
                    <img src="https://via.placeholder.com/80" />
                    <span>Équipe 7</span>
                </div>

                <div class="team" data-name="Équipe 8   ">
                    <img src="https://via.placeholder.com/80" />
                    <span>Équipe 8</span>
                </div>

            </div>

            <div class="actions">
                <button id="createBtn">comfirmer</button>
                <button id="resetBtn">Reset</button>
            </div>

        </div>

        <!-- RIGHT -->
         <div class="card-result"> 
       

            <h2>📊 Match créé</h2>

           
        
        </div>
    </section>

</main>


</body>
</html>
