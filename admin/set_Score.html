<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set Score - UI Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

:root {
    --bg-main: #1f2a44;
    --bg-soft: #273553;
    --bg-card: #344568;
    --line: #3e4f73;
    --text-main: #f8fafc;
    --text-soft: #c7d2e3;
    --team-a: #f4a261;
    --team-b: #8b1e3f;
    --ok: #22c55e;
    --warn: #ef4444;

    --shadow: 0 18px 40px rgba(11, 17, 34, 0.25);
    --r-xl: 24px;
    --r-lg: 16px;
    --r-md: 12px;
}

body {
    min-height: 100vh;
    font-family: "Manrope", sans-serif;
    color: var(--text-main);
    background:
        radial-gradient(circle at 10% 10%, rgba(244, 162, 97, 0.12), transparent 35%),
        radial-gradient(circle at 90% 15%, rgba(139, 30, 63, 0.16), transparent 40%),
        linear-gradient(150deg, #14203a 0%, var(--bg-main) 55%, #1c2740 100%);
}

.page {
    width: min(1200px, 94vw);
    margin: 24px auto 36px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 18px;
}

.panel {
    background: linear-gradient(180deg, rgba(52, 69, 104, 0.95) 0%, rgba(39, 53, 83, 0.95) 100%);
    border: 1px solid rgba(199, 210, 227, 0.2);
    border-radius: var(--r-xl);
    box-shadow: var(--shadow);
}

.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    gap: 10px;
}

.live {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: #ffd8b8;
    font-weight: 800;
}

.dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #ff8751;
    box-shadow: 0 0 0 0 rgba(255, 135, 81, 0.5);
    animation: pulse 1.4s infinite;
}

@keyframes pulse {
    70% {
        box-shadow: 0 0 0 8px rgba(255, 135, 81, 0);
    }
    100% {
        box-shadow: 0 0 0 0 rgba(255, 135, 81, 0);
    }
}

.controls {
    display: flex;
    gap: 10px;
}

.action {
    border: 1px solid transparent;
    color: var(--text-main);
    background: rgba(255, 255, 255, 0.08);
    border-radius: 10px;
    font-size: 13px;
    font-weight: 700;
    padding: 9px 12px;
    cursor: pointer;
    transition: 0.2s ease;
}

.action:disabled {
    opacity: 0.45;
    cursor: not-allowed;
}

.action.start {
    border-color: rgba(34, 197, 94, 0.45);
    color: #c9f4d8;
}

.action.start:hover:not(:disabled) {
    background: rgba(34, 197, 94, 0.2);
}

.action.end {
    border-color: rgba(239, 68, 68, 0.45);
    color: #ffd2d2;
}

.action.end:hover:not(:disabled) {
    background: rgba(239, 68, 68, 0.2);
}

.scoreboard {
    padding: 20px 22px 22px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 16px;
    border-top: 1px solid rgba(199, 210, 227, 0.17);
}

.team {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.team.right {
    text-align: right;
    align-items: flex-end;
}

.team-meta {
    display: flex;
    align-items: center;
    gap: 10px;
}

.team.right .team-meta {
    flex-direction: row-reverse;
}

.badge-color {
    width: 12px;
    height: 42px;
    border-radius: 999px;
}

.team-name {
    font-family: "Sora", sans-serif;
    font-weight: 700;
    font-size: clamp(16px, 1.8vw, 21px);
    letter-spacing: 0.2px;
}

.team-sub {
    font-size: 12px;
    color: var(--text-soft);
    text-transform: uppercase;
    letter-spacing: 1.1px;
}

.score-main {
    text-align: center;
}

.score-main .numbers {
    font-family: "Sora", sans-serif;
    font-weight: 800;
    font-size: clamp(42px, 6vw, 86px);
    line-height: 0.95;
    letter-spacing: -2px;
}

.score-main .numbers .a {
    color: var(--team-a);
}

.score-main .numbers .b {
    color: #d79ab1;
}

.vs {
    margin-top: 8px;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-soft);
    font-weight: 700;
}

.sections {
    display: grid;
    grid-template-columns: 1.2fr 0.8fr;
    gap: 18px;
}

.card {
    padding: 18px;
}

.card h2 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1.3px;
    color: var(--text-soft);
    margin-bottom: 14px;
}

.trials {
    display: grid;
    gap: 12px;
}

.trial {
    border: 1px solid rgba(199, 210, 227, 0.16);
    border-radius: var(--r-lg);
    background: linear-gradient(180deg, rgba(31, 42, 68, 0.5) 0%, rgba(31, 42, 68, 0.22) 100%);
    overflow: hidden;
}

.trial-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 14px;
    border-bottom: 1px solid rgba(199, 210, 227, 0.13);
}

.trial-title {
    font-size: 15px;
    font-weight: 700;
}

.trial-badge {
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 999px;
    color: #fbe6d0;
    background: rgba(244, 162, 97, 0.2);
    border: 1px solid rgba(244, 162, 97, 0.35);
}

.trial-body {
    padding: 12px 14px 14px;
    display: grid;
    gap: 12px;
}

.rows {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.row {
    border: 1px solid rgba(199, 210, 227, 0.16);
    border-radius: var(--r-md);
    background: rgba(31, 42, 68, 0.52);
    padding: 9px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 7px;
}

.row .value {
    text-align: center;
    font-family: "Sora", sans-serif;
    font-size: 24px;
    font-weight: 700;
}

.row.a .value {
    color: var(--team-a);
}

.row.b .value {
    color: #f0b7cc;
}

.btn {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    border: 1px solid rgba(199, 210, 227, 0.22);
    background: rgba(255, 255, 255, 0.07);
    color: var(--text-main);
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
    transition: 0.2s ease;
}

.btn:hover:not(:disabled) {
    border-color: rgba(199, 210, 227, 0.42);
    transform: translateY(-1px);
}

.btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}

.save {
    border: 1px solid rgba(244, 162, 97, 0.45);
    color: #ffe4ce;
    background: rgba(244, 162, 97, 0.18);
    border-radius: 10px;
    padding: 9px 10px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.2s ease;
}

.save:hover:not(:disabled) {
    background: rgba(244, 162, 97, 0.28);
}

.save:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}

.log {
    min-height: 100%;
}

.log-list {
    border: 1px solid rgba(199, 210, 227, 0.15);
    border-radius: var(--r-lg);
    background: rgba(31, 42, 68, 0.4);
    min-height: 350px;
    max-height: 520px;
    overflow: auto;
}

.log-item {
    padding: 12px 13px;
    border-bottom: 1px solid rgba(199, 210, 227, 0.12);
    font-size: 13px;
    color: var(--text-soft);
}

.log-item strong {
    color: var(--text-main);
}

.log-item:last-child {
    border-bottom: 0;
}

.message {
    margin-top: 12px;
    font-size: 12px;
    color: #ffd4d4;
    border: 1px solid rgba(239, 68, 68, 0.33);
    background: rgba(239, 68, 68, 0.14);
    border-radius: 10px;
    padding: 10px;
}

.toast {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translate(-50%, 16px);
    opacity: 0;
    pointer-events: none;
    background: #12233f;
    color: #ecf3ff;
    border: 1px solid rgba(34, 197, 94, 0.4);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 700;
    transition: 0.25s ease;
    z-index: 99;
}

.toast.show {
    transform: translate(-50%, 0);
    opacity: 1;
}

@media (max-width: 980px) {
    .sections {
        grid-template-columns: 1fr;
    }

    .log-list {
        min-height: 220px;
    }
}

@media (max-width: 760px) {
    .topbar {
        flex-wrap: wrap;
    }

    .controls {
        width: 100%;
    }

    .action {
        flex: 1;
    }

    .scoreboard {
        grid-template-columns: 1fr;
        text-align: center;
    }

    .team,
    .team.right {
        align-items: center;
        text-align: center;
    }

    .team-meta,
    .team.right .team-meta {
        flex-direction: row;
    }

    .badge-color {
        width: 38px;
        height: 10px;
    }

    .rows {
        grid-template-columns: 1fr;
    }
}
</style>
</head>
<body>
<div class="page">
    <section class="panel">
        <div class="topbar">
            <div class="live"><span class="dot"></span> LIVE MATCH</div>
            <div class="controls">
                <button class="action start btn-start" type="button">Demarrer</button>
                <button class="action end btn-end" type="button">Terminer</button>
            </div>
        </div>

        <div class="scoreboard">
            <div class="team">
                <div class="team-sub">Equipe A</div>
                <div class="team-meta">
                    <div class="badge-color" style="background: var(--team-a)"></div>
                    <div class="team-name" id="teamAName">Team A</div>
                </div>
            </div>

            <div class="score-main">
                <div class="numbers"><span class="a" id="aScore">0</span> : <span class="b" id="bScore">0</span></div>
                <div class="vs">Match en cours</div>
            </div>

            <div class="team right">
                <div class="team-sub">Equipe B</div>
                <div class="team-meta">
                    <div class="badge-color" style="background: var(--team-b)"></div>
                    <div class="team-name" id="teamBName">Team B</div>
                </div>
            </div>
        </div>
    </section>

    <section class="sections">
        <article class="panel card">
            <h2>Epreuves</h2>

            <div class="trials">
                <div class="trial" data-id="1">
                    <div class="trial-head">
                        <div class="trial-title">Tiree de l'epee</div>
                        <div class="trial-badge">En cours</div>
                    </div>
                    <div class="trial-body">
                        <div class="rows">
                            <div class="row a">
                                <button class="btn" type="button" onclick="change(this, 'a', -1)">-</button>
                                <div class="value" data-team="a">0</div>
                                <button class="btn" type="button" onclick="change(this, 'a', 1)">+</button>
                            </div>
                            <div class="row b">
                                <button class="btn" type="button" onclick="change(this, 'b', -1)">-</button>
                                <div class="value" data-team="b">0</div>
                                <button class="btn" type="button" onclick="change(this, 'b', 1)">+</button>
                            </div>
                        </div>
                        <button class="save" type="button" onclick="save(this)">Valider l'epreuve</button>
                    </div>
                </div>

                <div class="trial" data-id="2">
                    <div class="trial-head">
                        <div class="trial-title">collectives</div>
                        <div class="trial-badge">En cours</div>
                    </div>
                    <div class="trial-body">
                        <div class="rows">
                            <div class="row a">
                                <button class="btn" type="button" onclick="change(this, 'a', -1)">-</button>
                                <div class="value" data-team="a">0</div>
                                <button class="btn" type="button" onclick="change(this, 'a', 1)">+</button>
                            </div>
                            <div class="row b">
                                <button class="btn" type="button" onclick="change(this, 'b', -1)">-</button>
                                <div class="value" data-team="b">0</div>
                                <button class="btn" type="button" onclick="change(this, 'b', 1)">+</button>
                            </div>
                        </div>
                        <button class="save" type="button" onclick="save(this)">Valider l'epreuve</button>
                    </div>
                </div>

                <div class="trial" data-id="3">
                    <div class="trial-head">
                        <div class="trial-title">Identification</div>
                        <div class="trial-badge">En cours</div>
                    </div>
                    <div class="trial-body">
                        <div class="rows">
                            <div class="row a">
                                <button class="btn" type="button" onclick="change(this, 'a', -1)">-</button>
                                <div class="value" data-team="a">0</div>
                                <button class="btn" type="button" onclick="change(this, 'a', 1)">+</button>
                            </div>
                            <div class="row b">
                                <button class="btn" type="button" onclick="change(this, 'b', -1)">-</button>
                                <div class="value" data-team="b">0</div>
                                <button class="btn" type="button" onclick="change(this, 'b', 1)">+</button>
                            </div>
                        </div>
                        <button class="save" type="button" onclick="save(this)">Valider l'epreuve</button>
                    </div>
                </div>

                <div class="trial" data-id="4">
                    <div class="trial-head">
                        <div class="trial-title">Cascades</div>
                        <div class="trial-badge">En cours</div>
                    </div>
                    <div class="trial-body">
                        <div class="rows">
                            <div class="row a">
                                <button class="btn" type="button" onclick="change(this, 'a', -1)">-</button>
                                <div class="value" data-team="a">0</div>
                                <button class="btn" type="button" onclick="change(this, 'a', 1)">+</button>
                            </div>
                            <div class="row b">
                                <button class="btn" type="button" onclick="change(this, 'b', -1)">-</button>
                                <div class="value" data-team="b">0</div>
                                <button class="btn" type="button" onclick="change(this, 'b', 1)">+</button>
                            </div>
                        </div>
                        <button class="save" type="button" onclick="save(this)">Valider l'epreuve</button>
                    </div>
                </div>
                <div class="trial" data-id="4">
                    <div class="trial-head">
                        <div class="trial-title">Vrai ou Faux</div>
                        <div class="trial-badge">En cours</div>
                    </div>
                    <div class="trial-body">
                        <div class="rows">
                            <div class="row a">
                                <button class="btn" type="button" onclick="change(this, 'a', -1)">-</button>
                                <div class="value" data-team="a">0</div>
                                <button class="btn" type="button" onclick="change(this, 'a', 1)">+</button>
                            </div>
                            <div class="row b">
                                <button class="btn" type="button" onclick="change(this, 'b', -1)">-</button>
                                <div class="value" data-team="b">0</div>
                                <button class="btn" type="button" onclick="change(this, 'b', 1)">+</button>
                            </div>
                        </div>
                        <button class="save" type="button" onclick="save(this)">Valider l'epreuve</button>
                    </div>
                </div>
            </div>
        </article>

        <aside class="panel card log">
            <h2>Journal du match</h2>
            <div class="log-list" id="log"></div>
            <div class="message" id="dbMessage" style="display:none;"></div>
        </aside>
    </section>
</div>

<div class="toast" id="toast">Score enregistre</div>

<script>
let scores = {};
let matchStarted = false;

const btnStart = document.querySelector('.btn-start');
const btnEnd = document.querySelector('.btn-end');

initState();

function initState() {
    disableControls(true);
    btnEnd.disabled = true;
    addSystemLog('Pret a demarrer un nouveau match.');
}

btnStart.addEventListener('click', () => {
    if (matchStarted) return;

    matchStarted = true;
    scores = {};

    document.querySelectorAll('.value').forEach((el) => {
        el.innerText = '0';
    });

    document.getElementById('aScore').innerText = '0';
    document.getElementById('bScore').innerText = '0';

    document.querySelector('.live').innerHTML = '<span class="dot"></span> LIVE MATCH';
    disableControls(false);

    btnStart.disabled = true;
    btnEnd.disabled = false;

    addSystemLog('Match demarre.');
});

btnEnd.addEventListener('click', () => {
    if (!matchStarted) return;
    if (!confirm('Terminer le match ?')) return;

    matchStarted = false;

    let totalA = 0;
    let totalB = 0;

    for (const key in scores) {
        totalA += scores[key].a || 0;
        totalB += scores[key].b || 0;
    }

    disableControls(true);

    document.querySelector('.live').innerText = 'MATCH TERMINE';

    let result = '';
    if (totalA > totalB) result = 'Team A gagne';
    else if (totalB > totalA) result = 'Team B gagne';
    else result = 'Match nul';

    alert(result + '\nScore: ' + totalA + ' - ' + totalB);
    addSystemLog('Match termine -> ' + totalA + ' - ' + totalB);

    btnStart.disabled = false;
    btnEnd.disabled = true;
});

function change(btn, team, val) {
    if (!matchStarted) return;

    const card = btn.closest('.trial');
    const id = card.dataset.id;

    if (!scores[id]) {
        scores[id] = { a: 0, b: 0 };
    }

    scores[id][team] = Math.max(0, (scores[id][team] || 0) + val);

    const el = card.querySelector('[data-team="' + team + '"]');
    el.innerText = String(scores[id][team]);
}

function save(btn) {
    if (!matchStarted) return;

    const card = btn.closest('.trial');
    const id = card.dataset.id;

    const a = scores[id] ? scores[id].a || 0 : 0;
    const b = scores[id] ? scores[id].b || 0 : 0;

    updateTotal();
    addLog(id, a, b);
    showToast('Epreuve ' + id + ' validee');
}

function updateTotal() {
    let totalA = 0;
    let totalB = 0;

    for (const key in scores) {
        totalA += scores[key].a || 0;
        totalB += scores[key].b || 0;
    }

    document.getElementById('aScore').innerText = String(totalA);
    document.getElementById('bScore').innerText = String(totalB);
}

function disableControls(state) {
    document.querySelectorAll('.btn, .save').forEach((el) => {
        el.disabled = state;
    });
}

function addLog(id, a, b) {
    const log = document.getElementById('log');

    const item = document.createElement('div');
    item.className = 'log-item';
    item.innerHTML = '<strong>Epreuve ' + id + '</strong> -> A: ' + a + ' | B: ' + b;

    log.prepend(item);
}

function addSystemLog(msg) {
    const log = document.getElementById('log');

    const item = document.createElement('div');
    item.className = 'log-item';
    item.innerText = msg;

    log.prepend(item);
}

function showToast(text) {
    const toast = document.getElementById('toast');
    toast.innerText = text;
    toast.classList.add('show');

    setTimeout(() => {
        toast.classList.remove('show');
    }, 2000);
}
</script>
</body>
</html>
